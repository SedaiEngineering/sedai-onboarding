name: sedai-onboarding-s3-ci-cd

on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
    paths:
      - 'aws/cloudformation/**.yml'
      - 'aws/cloudformation/**.yaml'
      - 'aws/cloudformation/nested/**.json'
      - 'eks/**clusterrole.yaml'
      - 'aws/cloudformation/nested-v2/**.json'
      - 'aws/cloudformation/billing-data-exporter/**.yaml'
      - 'aws/cloudformation/stacksets/**.py'

jobs:
  build:
    name: Push yamls
    runs-on: sedai-arc-onboarding-s3
# Initialization

    steps:
      
      - name: SCM Checkout 
        uses: actions/checkout@v3

      - name: Install AWS CLI
        run: |
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update
          aws --version
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4  # Updated to v4
        with:
          aws-access-key-id: ${{ secrets.S3_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.S3_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
    
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate and validate StackSet templates
        run: |
          set -euo pipefail

          # setup-python provides an isolated interpreter with pip (and no
          # PEP-668 restriction), so plain pip installs work on any runner.
          python -m pip install --quiet --upgrade pip
          python -m pip install --quiet pyyaml cfn-lint

          # Generate (the script exits non-zero on any policy/source problem).
          python aws/cloudformation/stacksets/generate_stackset_templates.py

          # Fail if either template is missing or empty.
          ro=aws/cloudformation/stacksets/iam-role-template-ro.yaml
          rw=aws/cloudformation/stacksets/iam-role-template-rw.yaml
          test -s "$ro" || { echo "::error::$ro was not generated"; exit 1; }
          test -s "$rw" || { echo "::error::$rw was not generated"; exit 1; }

          # Fail if the generated CloudFormation is invalid.
          cfn-lint "$ro" "$rw"
          echo "StackSet templates generated and validated."

      - name: Push to S3 bucket
        run: |
          aws s3 cp aws/cloudformation/ s3://${{ secrets.S3_BUCKET }} --exclude "*" --include "*.yml" --include "*.yaml" --include "nested/*.json" --recursive
          aws s3 cp eks/ s3://${{ secrets.S3_BUCKET }} --exclude "*" --include "*clusterrole.yaml" --recursive
